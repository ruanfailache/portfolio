services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - portfolio
    restart: unless-stopped

  portfolio:
    build: ./frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=https://ruanfailache.dev
      - STRAPI_URL=http://cms:1337
      - STRAPI_TOKEN=${STRAPI_TOKEN}
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
    depends_on:
      cms:
        condition: service_healthy
    restart: unless-stopped

  cms:
    build: ./cms
    expose:
      - "1337"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=1337
      - APP_KEYS=${APP_KEYS}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - API_TOKEN_SALT=${API_TOKEN_SALT}
      - JWT_SECRET=${JWT_SECRET}
      - TRANSFER_TOKEN_SALT=${TRANSFER_TOKEN_SALT:-}
      - DATABASE_FILENAME=.tmp/data.db
    volumes:
      - cms_data:/app/.tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:1337/_health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  cms_data:
  caddy_data:
  caddy_config:
